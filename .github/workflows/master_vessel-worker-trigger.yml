name: Deploy Azure Function - vessel-worker-trigger

on:
  push:
    branches:
      - master
    paths:
      - "apps/trigger/**"
      - "packages/r2/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"
  FUNCTION_APP_NAME: "vessel-worker-trigger"
  FUNCTION_APP_PATH: "apps/trigger"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm 10
        run: corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck trigger
        run: pnpm --filter @vessel/trigger typecheck

      - name: Build trigger (and workspace deps)
        run: pnpm --filter @vessel/trigger build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          slot-name: "Production"
          package: ${{ env.FUNCTION_APP_PATH }}

name: Deploy Azure Function - vesse-worker-trigger

on:
  push:
    branches:
      - master
    paths:
      - "apps/trigger/**"
      - "packages/r2/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"
  FUNCTION_APP_NAME: "vesse-worker-trigger"
  FUNCTION_APP_PATH: "apps/trigger"
  DEPLOY_STAGING_PATH: "apps/trigger/.deploy"
  DEPLOY_ZIP_PATH: "trigger-deploy.zip"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify pnpm 10
        run: npx pnpm@10.33.0 --version

      - name: Install dependencies
        run: npx pnpm@10.33.0 install --frozen-lockfile

      - name: Typecheck trigger
        run: npx pnpm@10.33.0 --filter @vessel/trigger typecheck

      - name: Build trigger (and workspace deps)
        run: npx pnpm@10.33.0 --filter @vessel/trigger build

      - name: Prepare deploy package
        run: |
          rm -rf "${{ env.DEPLOY_STAGING_PATH }}" "${{ env.DEPLOY_ZIP_PATH }}"
          mkdir -p "${{ env.DEPLOY_STAGING_PATH }}"
          cp "${{ env.FUNCTION_APP_PATH }}/host.json" "${{ env.DEPLOY_STAGING_PATH }}/"
          cp "${{ env.FUNCTION_APP_PATH }}/package.json" "${{ env.DEPLOY_STAGING_PATH }}/"
          cp -r "${{ env.FUNCTION_APP_PATH }}/dist" "${{ env.DEPLOY_STAGING_PATH }}/dist"
          npm install --prefix "${{ env.DEPLOY_STAGING_PATH }}" --omit=dev --no-package-lock
          (cd "${{ env.DEPLOY_STAGING_PATH }}" && zip -r "../../../${{ env.DEPLOY_ZIP_PATH }}" .)

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6193E9210FB849269A8F1B33EA27E290 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5C3FA72D810D4DF18240DE2AE0B7495C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E5D3502C79874A11A85D5F8AD000D082 }}

      - name: Deploy zip package to Azure Function App
        run: |
          az functionapp deployment source config-zip \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group hive-rg \
            --src "${{ env.DEPLOY_ZIP_PATH }}"
          az functionapp sync-function-triggers \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group hive-rg